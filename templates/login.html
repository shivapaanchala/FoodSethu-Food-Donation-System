<!DOCTYPE html>
<html>
<head>

    <title>FoodSethu Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

        <style>

        input::placeholder {
            color: #adb5bd !important;
            opacity: 1;
        }

        </style>

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow mt-5">

                <div class="card-body p-4">

                    <h2 class="text-center text-success mb-2">
                        Welcome to FoodSethu
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Login to continue the FoodSethu
                    </p>

                    <form method="POST">

                        <div class="mb-3">

                           

                            <input type="text"
                                   name="login_input"
                                   class="form-control"
                                   placeholder="Enter Full Name or Email"
                                   required>

                        </div>

                    <div class="mb-3">

                        

                        <div class="input-group">

                            <input type="password"
                                   id="password"
                                   name="password"
                                   class="form-control"
                                   placeholder="Enter Password"
                                   required>

                            <span class="input-group-text"
                                  onmouseover="showPassword()"
                                  onmouseout="hidePassword()"
                                  style="cursor:pointer;">

                                Show

                            </span>

                        </div>

                    </div>

                        <button type="submit"
                                class="btn btn-success w-100">

                            Login

                        </button>

                    </form>

                    <hr>

                    <p class="text-center">

                        New to FoodSethu?

                        <a href="/register">
                            Create an Account
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function showPassword() {

    document.getElementById("password").type = "text";

}

function hidePassword() {

    document.getElementById("password").type = "password";

}

</script>

</body>
</html>
