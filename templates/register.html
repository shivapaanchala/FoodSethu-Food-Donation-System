<!DOCTYPE html>
<html>
<head>

    <title>FoodSethu Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

        <style>

        input::placeholder {
            color: #adb5bd !important;
            opacity: 1;
        }

        </style>

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card shadow mt-5">

                <div class="card-body p-4">

                    <h2 class="text-center text-success mb-2">
                        Create Your Account
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Join FoodSethu and help connect food donors with those in need
                    </p>

                    <form method="POST">

                        <div class="mb-3">

                            <input type="text"
                                   name="full_name"
                                   class="form-control"
                                   placeholder="Enter Full Name"
                                   required>

                        </div>

                        <div class="mb-3">


                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="Enter Email Address"
                                   required>

                        </div>

                        <div class="mb-3">


                            <div class="input-group">

                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Enter Password"
                                       required>

                                <span class="input-group-text"
                                      onmouseover="showPassword()"
                                      onmouseout="hidePassword()"
                                      style="cursor:pointer;">

                                    Show

                                </span>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Select Role
                            </label>

                            <select name="role"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Choose Role
                                </option>

                                <option value="hostel">
                                    Hostel
                                </option>

                                <option value="orphanage">
                                    Orphanage
                                </option>

                            </select>

                        </div>

                        <button type="submit"
                                class="btn btn-success w-100">

                            Create Account

                        </button>

                    </form>

                    <hr>

                    <p class="text-center">

                        Already registered?

                        <a href="/login">
                            Sign In
                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

<script>

function showPassword() {

    document.getElementById("password").type = "text";

}

function hidePassword() {

    document.getElementById("password").type = "password";

}

</script>

</body>
</html>
